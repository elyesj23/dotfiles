# ~/.config/starship.toml
# Two-line prompt with Nerd Font icons + Catppuccin Mocha palette

format = """
$status\
$directory\
$git_branch\
$git_status\
$python\
$custom\
$nodejs\
$rust\
$docker_context\
$cmd_duration\
$line_break\
$character"""

add_newline = true

palette = "catppuccin_mocha"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo  = "#f2cdcd"
pink      = "#f5c2e7"
mauve     = "#cba6f7"
red       = "#f38ba8"
maroon    = "#eba0ac"
peach     = "#fab387"
yellow    = "#f9e2af"
green     = "#a6e3a1"
teal      = "#94e2d5"
sky       = "#89dceb"
sapphire  = "#74c7ec"
blue      = "#89b4fa"
lavender  = "#b4befe"
text      = "#cdd6f4"
subtext1  = "#bac2de"
overlay2  = "#9399b2"
surface1  = "#45475a"

[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold yellow)"

[status]
disabled = false
format = "[$symbol$status]($style) "
style = "bold red"
symbol = "✗ "
map_symbol = true

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold blue"
read_only = "  "
read_only_style = "red"
home_symbol = "~ "

[git_branch]
symbol = " "
format = "on [$symbol$branch]($style) "
style = "bold mauve"
truncation_length = 24
truncation_symbol = "…"

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "bold red"
conflicted = "·"
ahead = "⇡"
behind = "⇣"
diverged = "⇕"
untracked = ""
stashed = ""
modified = "·"
staged = "·"
renamed = ""
deleted = ""

[python]
symbol = " "
format = 'venv [$symbol($virtualenv )]($style)'
style = "bold yellow"
detect_extensions = ["py"]
detect_files = ["pyproject.toml", "requirements.txt", ".python-version", "Pipfile", "setup.py"]
detect_folders = [".venv", "venv"]

[nodejs]
symbol = " "
format = "via [$symbol($version )]($style)"
style = "bold green"
detect_files = ["package.json", ".nvmrc"]

[rust]
symbol = " "
format = "via [$symbol($version )]($style)"
style = "bold peach"

[docker_context]
symbol = " "
format = "via [$symbol$context]($style) "
style = "bold sapphire"
only_with_files = true

[cmd_duration]
min_time = 2000
format = "took [$duration](bold peach) "

[custom.no_venv]
command = 'echo "no venv"'
when = '[ -z "$VIRTUAL_ENV" ] && [ -d ".venv" ]'
style = "bold red"
format = "[$output]($style) "

[hostname]
disabled = true

[username]
disabled = true
