# ~/.config/starship.toml
# Two-line prompt, plain ASCII (no Nerd Font required), Python-aware.

format = """
$directory\
$git_branch\
$git_status\
$python\
$cmd_duration\
$line_break\
$character"""

add_newline = true

[character]
success_symbol = "[❯](bold cyan)"
error_symbol   = "[✗](bold red)"
vimcmd_symbol  = "[❮](bold green)"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold green"
read_only = " RO"

[git_branch]
symbol = ""
format = " on [$branch](yellow)"
truncation_length = 24
truncation_symbol = "…"

[git_status]
format = '([\[$all_status$ahead_behind\]](red)) '
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
conflicted = "="
untracked = "?"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"
stashed = "$"

[python]
symbol = "py "
format = 'via [${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
style = "yellow bold"
detect_extensions = ["py"]
detect_files = ["pyproject.toml", "requirements.txt", ".python-version", "Pipfile", "setup.py"]
detect_folders = [".venv", "venv"]

[cmd_duration]
min_time = 2_000
format = "took [$duration](bold yellow) "

[hostname]
disabled = true

[username]
disabled = true
